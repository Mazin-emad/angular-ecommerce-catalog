<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#CBE4E8"/>
  
  <!-- Shopping Cart -->
  <g transform="translate(200, 150)">
    <!-- Cart body -->
    <path d="M100 200 L120 100 L350 100 L330 200 Z" stroke="#666" stroke-width="3" fill="none"/>
    <!-- Cart handle -->
    <path d="M80 200 L100 200" stroke="#666" stroke-width="3"/>
    <!-- Cart wheels -->
    <circle cx="150" cy="220" r="15" stroke="#666" stroke-width="3" fill="none"/>
    <circle cx="300" cy="220" r="15" stroke="#666" stroke-width="3" fill="none"/>
  </g>
  
  <!-- Phone -->
  <g transform="translate(320, 80)">
    <rect x="0" y="0" width="120" height="200" rx="10" stroke="#333" stroke-width="3" fill="#fff"/>
    <rect x="10" y="20" width="100" height="160" fill="#eee"/>
    <circle cx="60" cy="190" r="5" fill="#333"/>
  </g>
  
  <!-- Shopping Bags -->
  <g transform="translate(180, 280)">
    <rect x="0" y="0" width="80" height="100" rx="5" fill="#FFB6C1"/>
    <path d="M20 0 Q40 -20 60 0" stroke="#FF69B4" stroke-width="3" fill="none"/>
  </g>
  <g transform="translate(280, 300)">
    <rect x="0" y="0" width="60" height="80" rx="5" fill="#FFB6C1"/>
    <path d="M15 0 Q30 -15 45 0" stroke="#FF69B4" stroke-width="3" fill="none"/>
  </g>
</svg>
