<div class="py-8">
  <!-- Breadcrumb -->
  <app-breadcrumb [items]="breadcrumbs" />

  <div class="grid grid-cols-1 lg:grid-cols-[1fr_2fr] gap-12 lg:gap-20">
    <!-- Left: Info Card -->
    <div class="border border-gray-200 rounded-lg p-8 h-fit">
      <!-- Call To Us -->
      <div class="flex items-start gap-4 mb-8">
        <div class="w-10 h-10 bg-red-500 rounded-full flex items-center justify-center shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z" />
          </svg>
        </div>
        <div>
          <h3 class="font-semibold text-lg mb-2">Call To Us</h3>
          <p class="text-sm text-gray-600 mb-1">We are available 24/7, 7 days a week.</p>
          <p class="text-sm text-gray-600">Phone: {{ contact.phone }}</p>
        </div>
      </div>

      <hr class="border-gray-200 mb-8" />

      <!-- Write To Us -->
      <div class="flex items-start gap-4">
        <div class="w-10 h-10 bg-red-500 rounded-full flex items-center justify-center shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
          </svg>
        </div>
        <div>
          <h3 class="font-semibold text-lg mb-2">Write To US</h3>
          <p class="text-sm text-gray-600 mb-2">Fill out our form and we will contact you within 24 hours.</p>
          <p class="text-sm text-gray-600">Email: {{ contact.email }}</p>
          <p class="text-sm text-gray-600">Address: {{ contact.address }}</p>
        </div>
      </div>
    </div>

    <!-- Right: Contact Form -->
    <div class="border border-gray-200 rounded-lg p-8">
      <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <input
            type="text"
            formControlName="name"
            placeholder="Your Name *"
            class="w-full px-4 py-3 bg-gray-100 rounded text-sm placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-gray-300"
          />
          <input
            type="email"
            formControlName="email"
            placeholder="Your Email *"
            class="w-full px-4 py-3 bg-gray-100 rounded text-sm placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-gray-300"
          />
          <input
            type="tel"
            formControlName="phone"
            placeholder="Your Phone *"
            class="w-full px-4 py-3 bg-gray-100 rounded text-sm placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-gray-300"
          />
        </div>
        <textarea
          formControlName="message"
          placeholder="Your Message"
          rows="8"
          class="w-full px-4 py-3 bg-gray-100 rounded text-sm placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-gray-300 resize-none"
        ></textarea>
        <div class="flex justify-end">
          <button
            type="submit"
            [disabled]="isSubmitting"
            class="bg-red-500 text-white px-12 py-3 rounded text-sm font-medium hover:bg-red-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
          >
            {{ isSubmitting ? 'Sending...' : 'Send Message' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
