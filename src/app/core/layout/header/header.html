<nav class="border-b border-gray-200 relative">
  <div class="max-w-6xl mx-auto flex items-center justify-between px-4 md:px-6 py-5 gap-4">

    <!-- Logo -->
    <app-logo size="md" />

    <!-- Desktop nav links -->
    <ul class="hidden md:flex items-center gap-10 text-sm text-gray-800 shrink-0">
      <li><a routerLink="/" routerLinkActive="text-gray-950 font-medium" [routerLinkActiveOptions]="{ exact: true }" class="hover:text-gray-950 transition-colors" (click)="closeMenu()">Home</a></li>
      <li><a routerLink="/contact" routerLinkActive="text-gray-950 font-medium" class="hover:text-gray-950 transition-colors" (click)="closeMenu()">Contact</a></li>
      <li><a routerLink="/about" routerLinkActive="text-gray-950 font-medium" class="hover:text-gray-950 transition-colors" (click)="closeMenu()">About</a></li>
      <li><a routerLink="/signup" routerLinkActive="text-gray-950 font-medium" class="hover:text-gray-950 transition-colors" (click)="closeMenu()">Sign Up</a></li>
    </ul>

    <!-- Search + icons -->
    <div class="flex items-center gap-5 md:gap-6 shrink-0">

      <!-- Search box -->
      <div class="hidden md:flex items-center gap-2 bg-gray-100 rounded px-3 py-2 w-56">
        <input
          type="text"
          placeholder="What are you looking for?"
          class="bg-transparent outline-none text-sm placeholder-gray-400 w-full"
          [(ngModel)]="searchQuery"
          (keyup.enter)="onSearch()"
        />
        <button (click)="onSearch()" aria-label="Search">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="7" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
        </button>
      </div>

      <!-- Mobile search icon -->
      <button class="md:hidden" (click)="onSearch()" aria-label="Search">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-800" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
      </button>

      <!-- Wishlist -->
      <a routerLink="/wishlist" class="relative" aria-label="Wishlist" (click)="closeMenu()">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 md:w-6 md:h-6 text-gray-800" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
        </svg>
        @if (wishlistCount > 0) {
          <span class="absolute -top-2 -right-2 bg-[#DB4444] text-white text-[10px] rounded-full w-4 h-4 flex items-center justify-center font-medium">{{ wishlistCount }}</span>
        }
      </a>

      <!-- Cart -->
      <a routerLink="/cart" class="relative" aria-label="Cart" (click)="closeMenu()">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 md:w-6 md:h-6 text-gray-800" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 1.745-4.59 1.745-6.75H5.106M7.5 14.25L5.106 5.272M7.5 14.25 5.272 5.106M16.5 17.25h.008v.008h-.008v-.008zM8.25 17.25h.008v.008h-.008v-.008z" />
        </svg>
        @if (cartCount > 0) {
          <span class="absolute -top-2 -right-2 bg-[#DB4444] text-white text-[10px] rounded-full w-4 h-4 flex items-center justify-center font-medium">{{ cartCount }}</span>
        }
      </a>

      <!-- User Menu -->
      <app-user-menu />

      <!-- Hamburger -->
      <button class="md:hidden" (click)="toggleMenu()" aria-label="Menu">
        @if (menuOpen) {
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-800" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-800" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        }
      </button>

    </div>

  </div>

  <!-- Mobile menu -->
  @if (menuOpen) {
    <div class="absolute top-full left-0 w-full bg-white border-b border-gray-200 shadow-lg md:hidden z-50">
      <ul class="flex flex-col text-sm text-gray-800">
        <li><a routerLink="/" routerLinkActive="underline" [routerLinkActiveOptions]="{ exact: true }" class="block px-6 py-3 hover:bg-gray-50" (click)="closeMenu()">Home</a></li>
        <li><a routerLink="/contact" routerLinkActive="underline" class="block px-6 py-3 hover:bg-gray-50" (click)="closeMenu()">Contact</a></li>
        <li><a routerLink="/about" routerLinkActive="underline" class="block px-6 py-3 hover:bg-gray-50" (click)="closeMenu()">About</a></li>
        <li><a routerLink="/signup" routerLinkActive="underline" class="block px-6 py-3 hover:bg-gray-50" (click)="closeMenu()">Sign Up</a></li>
        <!-- Mobile search -->
        <li class="px-6 py-3">
          <div class="flex items-center gap-2 bg-gray-100 rounded px-3 py-2">
            <input type="text" placeholder="What are you looking for?" class="bg-transparent outline-none text-sm placeholder-gray-400 w-full" [(ngModel)]="searchQuery" (keyup.enter)="onSearch()" />
            <button (click)="onSearch()" aria-label="Search">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="7" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
              </svg>
            </button>
          </div>
        </li>
      </ul>
    </div>
  }
</nav>
