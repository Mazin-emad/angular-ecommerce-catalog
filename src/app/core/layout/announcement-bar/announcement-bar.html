@if (announcementMessage) {
  <div class="bg-black text-white">
    <div class="max-w-6xl mx-auto flex items-center justify-between px-4 md:px-6 py-2.5 md:py-3">
      <!-- Left spacer on desktop to push center content -->
      <div class="hidden md:block flex-1"></div>

      <!-- Centered text -->
      <div class="flex items-center justify-center gap-1.5 text-xs sm:text-sm text-center flex-shrink flex-wrap sm:flex-nowrap">
        <p>{{ announcementMessage }}</p>
        <a routerLink="/products" class="font-semibold underline hover:opacity-80 transition-opacity whitespace-nowrap">ShopNow</a>
      </div>

      <!-- Language selector (right) -->
      <div class="flex-1 flex justify-end shrink-0">
        <div class="relative">
          <select
            [(ngModel)]="selectedLanguage"
            (change)="onLanguageChange()"
            class="appearance-none bg-transparent text-white text-sm pr-5 cursor-pointer focus:outline-none"
          >
            @for (language of languages; track language.code) {
              <option [value]="language.code" class="bg-black text-white">{{ language.name }}</option>
            }
          </select>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-3.5 h-3.5 text-white absolute right-0 top-1/2 -translate-y-1/2 pointer-events-none"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
          </svg>
        </div>
      </div>
    </div>
  </div>
} @else {
  <div></div>
}
