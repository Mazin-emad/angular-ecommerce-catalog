@if (announcementMessage) {
  <div class="announcement-bar">
    <div class="container">
      <div class="flex gap-4 items-center">
        <p>{{ announcementMessage }}</p>
        <a href="#" class="bold hover:underline">Shop Now</a>
      </div>
      <div class="language-selector">
        <select id="language-select" class="bg-black text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500" [(ngModel)]="selectedLanguage" (change)="onLanguageChange()">
          @for (language of languages; track language.code) {
            <option [value]="language.code">
              {{ language.name }}
            </option>
          }
        </select>
      </div>
    </div>
  </div>
} @else {
  <div></div>
}
